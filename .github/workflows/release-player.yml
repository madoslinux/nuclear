name: Release Player

on:
  push:
    tags:
      - "player@*.*.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install node deps
        run: pnpm install --frozen-lockfile

      - name: Build AppImage
        run: pnpm --filter @nuclearplayer/player exec tauri build --bundles appimage --target x86_64-unknown-linux-gnu

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/player/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            packages/player/src-tauri/target/release/bundle/appimage/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
